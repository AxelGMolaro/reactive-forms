<app-form-field [label]="label" [control]="control">

  <div class="flex flex-col gap-2">

    @for (opt of options; track opt.value) {
      <label class="flex items-center gap-2 cursor-pointer">

        <input
          type="radio"
          [value]="opt.value"
          [formControl]="control"
        />

        <span class="text-sm">
          {{ opt.label }}
        </span>

      </label>
    }

  </div>

</app-form-field>
