<app-code-snipped
  title="Reactive Input - Radio"
  [htmlCode]="htmlExample"
  [tsCode]="tsExample"
  [preview]="previewTpl"
></app-code-snipped>

<ng-template #previewTpl>
  <form [formGroup]="form" class="flex flex-col gap-4 w-full max-w-sm">

    <app-csradio
      label="Género"
      [control]="form.controls.gender"
      [options]="options"
    />

    <span class="text-sm text-gray-600">
      Value: {{ form.value | json }}
    </span>

  </form>
</ng-template>
