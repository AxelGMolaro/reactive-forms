<app-form-field [label]="label" [control]="control">

  <div class="relative">

    <input 
      [type]="show ? 'text' : 'password'"
      [formControl]="control"
      [placeholder]="placeholder"
      class="border p-2 rounded outline-none transition-all w-full pr-10"
      [ngClass]="{
        'border-red-500': control.invalid && (control.touched || control.dirty),
        'border-green-500': control.valid && (control.touched || control.dirty)
      }"
    />

    <!-- 👁️ toggle -->
    <button
      type="button"
      (click)="show = !show"
      class="absolute right-2 top-2 text-sm"
    >
      {{ show ? '🙈' : '👁️' }}
    </button>

  </div>

</app-form-field>
