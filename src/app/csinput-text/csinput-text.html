<app-code-snipped
  title="Reactive Input"
  [htmlCode]="htmlExample"
  [tsCode]="tsExample"
  [preview]="previewTpl"
></app-code-snipped>

<!-- 🔥 PREVIEW REAL -->
<ng-template #previewTpl>
  <form [formGroup]="form" class="flex flex-col gap-2">
    <input 
      formControlName="name"
      class="border p-2 rounded"
      placeholder="Your name"
    />

    <span class="text-sm text-gray-600">
      Value: {{ form.value | json }}
    </span>
  </form>
</ng-template>
