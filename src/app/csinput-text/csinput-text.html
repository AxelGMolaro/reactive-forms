<app-form-field [label]="label" [control]="control">

  <input 
    [formControl]="control"
    [placeholder]="placeholder"
    class="border p-2 rounded outline-none transition-all w-full"
    [ngClass]="{
      'border-red-500': control.invalid && control.touched,
      'border-green-500': control.valid && control.touched
    }"
  />

</app-form-field>
