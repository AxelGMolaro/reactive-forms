<app-code-snipped
  title="Reactive Input - TextArea"
  [htmlCode]="htmlExample"
  [tsCode]="tsExample"
  [preview]="previewTpl"
></app-code-snipped>

<ng-template #previewTpl>
  <form [formGroup]="form" class="flex flex-col gap-4 w-full max-w-sm">

    <app-cstext-area
      label="Descripción"
      [control]="form.controls.description"
      placeholder="Escribí algo..."
    />

    <span class="text-sm text-gray-600">
      Value: {{ form.value | json }}
    </span>

  </form>
</ng-template>
